var quiz=[],ans=[],cur=0,total=0;
function log(m){document.getElementById("log").textContent=m;}
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;"):"";}
function sh(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
function pick(a,n){var b=a.slice();sh(b);return b.slice(0,n);}
function show(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("on");});document.getElementById(id).classList.add("on");}
function render(){
  var q=quiz[cur];
  document.getElementById("pT").textContent=(cur+1)+"/"+total;
  document.getElementById("pB").style.width=((cur+1)/total*100)+"%";
  document.getElementById("btnPrev").style.display=cur>0?"block":"none";
  document.getElementById("btnNext").style.display=cur<total-1?"block":"none";
  document.getElementById("btnSub").style.display=cur===total-1?"block":"none";
  var typeHtml="";
  if(q.type==="single"){typeHtml='<span class="qtype single">单选题</span>';}
  else if(q.type==="multi"){typeHtml='<span class="qtype multi">多选题</span><div class="hint">可选择多个答案</div>';}
  else if(q.type==="judge"){typeHtml='<span class="qtype judge">判断题</span>';}
  var h='<div class="qc">'+typeHtml+'<div class="qt">'+esc(q.question)+'</div>';
  if(q.options&&q.options.length){
    for(var i=0;i<q.options.length;i++){
      var isMulti=(q.type==="multi");
      var isSel=false;
      if(isMulti){
        var curAns=ans[cur]||[];
        isSel=curAns.indexOf(LC[i])>-1;
      }else{
        isSel=ans[cur]===LC[i];
      }
      var sel=isSel?" sel":"";
      var typeAttr='data-type="'+q.type+'" data-idx="'+i+'"';
      h+='<div class="opt'+sel+'" '+typeAttr+'>'+LC[i]+". "+esc(q.options[i])+"</div>";
    }
  }
  h+="</div>";
  document.getElementById("qA").innerHTML=h;
  var opts=document.querySelectorAll(".opt");
  for(var i=0;i<opts.length;i++){
    opts[i].ontouchend=function(e){e.preventDefault();};
    opts[i].onclick=function(){
      var qtype=this.getAttribute("data-type");
      var idx=parseInt(this.getAttribute("data-idx"));
      if(qtype==="multi"){
        if(!ans[cur])ans[cur]=[];
        var arr=ans[cur];
        var idx2=arr.indexOf(LC[idx]);
        if(idx2>-1){arr.splice(idx2,1);}
        else{arr.push(LC[idx]);}
        ans[cur]=arr;
      }else{
        ans[cur]=LC[idx];
      }
      render();
    };
  }
  log("第"+(cur+1)+"题 | "+q.type);
}
function prev(){if(cur>0){cur--;render();}}
function next(){if(cur<total-1){cur++;render();}else{submit();}}
function submit(){
  var cr=0;
  for(var i=0;i<total;i++){
    var q=quiz[i],u=ans[i];
    if(q.type==="single"||q.type==="judge"){if(u===q.answer)cr++;}
    else if(q.type==="multi"){if(u&&q.answer){var ua=(u instanceof Array)?u.slice().sort().join(""):u.split("").sort().join("");var qa=q.answer.split("").sort().join("");if(ua===qa)cr++;}}
    else{if(u&&u.trim()===q.answer.trim())cr++;}}
  }
  var pct=Math.round(cr/total*100);
  document.getElementById("rC").textContent=cr;
  document.getElementById("rW").textContent=total-cr;
  document.getElementById("rP").textContent=pct+"%";
  var ic="🎉",ti="完成！";
  if(pct>=90){ic="🏆";ti="满分高手！";}
  else if(pct>=70){ic="👏";ti="表现不错！";}
  else if(pct>=60){ic="💪";ti="继续加油！";}
  else{ic="📚";ti="再接再厉！";}
  document.getElementById("rI").textContent=ic;
  document.getElementById("rT").textContent=ti;
  show("rScreen");
}
function showReview(){
  var h="";
  for(var i=0;i<total;i++){
    var q=quiz[i],u=ans[i],ok=false;
    if(q.type==="single"||q.type==="judge"){ok=u===q.answer;}
    else if(q.type==="multi"){if(u&&q.answer){var ua=(u instanceof Array)?u.slice().sort().join(""):u.split("").sort().join("");var qa=q.answer.split("").sort().join("");ok=ua===qa;}}
    else{ok=u&&u.trim()===q.answer.trim();}
    var cls=ok?"ri2r":"ri2w";
    var ua2=(u instanceof Array)?u.sort().join(""):(u||"未作答");
    var ra=q.answer||"";
    h+='<div class="ri2 '+cls+'"><div class="rim">'+(ok?"✅ ":"❌ ")+esc(q.question)+'<br><small>('+q.type+')</small></div>';
    h+='<div class="rab '+(ok?"rabr":"rabw")+'">你的答案：'+esc(ua2)+'</div>';
    if(!ok){h+='<div class="rab rabr">正确答案：'+esc(ra)+'</div>';}
    h+='</div>';
  }
  document.getElementById("reviewList").innerHTML=h;
  show("vScreen");
}
document.getElementById("startBtn").onclick=function(){
  var ns=parseInt(document.getElementById("iS").value)||5;
  var nm=parseInt(document.getElementById("iM").value)||2;
  var nj=parseInt(document.getElementById("iJ").value)||3;
  var s=Q.filter(function(q){return q.type==="single";});
  var m=Q.filter(function(q){return q.type==="multi";});
  var j=Q.filter(function(q){return q.type==="judge";});
  quiz=pick(s,ns).concat(pick(m,nm)).concat(pick(j,nj));
  total=quiz.length;
  ans=new Array(total);
  cur=0;
  show("qScreen");
  render();
};
document.getElementById("btnPrev").onclick=prev;
document.getElementById("btnNext").onclick=next;
document.getElementById("btnSub").onclick=submit;
document.getElementById("restartBtn").onclick=function(){show("sScreen");};
document.getElementById("reviewBtn").onclick=showReview;
document.getElementById("backBtn").onclick=function(){show("rScreen");};
log("就绪 "+Q.length+"题");
</script>
